<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .avatar-wrapper {
            position: relative;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e5e7eb;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .avatar:hover {
            border-color: #3b82f6;
        }
        #avatar-input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }
        .info-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-item label {
            font-size: 14px;
            color: #6b7280;
            font-weight: 500;
        }
        .info-item input,
        .info-item textarea {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            resize: none;
        }
        .info-item input:focus,
        .info-item textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .save-btn:hover {
            background-color: #2563eb;
        }
        .save-btn:active {
            transform: scale(0.98);
        }
        .display-info {
            width: 100%;
            text-align: center;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .display-name {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .display-bio {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>个人信息卡片</h1>
    <div class="card">
        <div class="avatar-wrapper">
            <img id="avatar-img" class="avatar" src="./11.jpg" alt="头像">
            <input type="file" id="avatar-input" accept="image/*">
        </div>

        <div class="info-item">
            <label for="name-input">姓名</label>
            <input type="text" id="name-input" placeholder="请输入姓名" value="十一">
        </div>

        <div class="info-item">
            <label for="bio-input">个人简介</label>
            <textarea id="bio-input" rows="3" placeholder="请输入个人简介">热爱前端开发，喜欢探索新技术</textarea>
        </div>

        <button class="save-btn" id="save-btn">保存</button>

        <div class="display-info">
            <div class="display-name" id="display-name">十一</div>
            <div class="display-bio" id="display-bio">热爱前端开发，喜欢探索新技术</div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const nameInput = document.getElementById('name-input');
        const bioInput = document.getElementById('bio-input');
        const saveBtn = document.getElementById('save-btn');
        const displayName = document.getElementById('display-name');
        const displayBio = document.getElementById('display-bio');
        const avatarImg = document.getElementById('avatar-img');
        const avatarInput = document.getElementById('avatar-input');

        // 保存功能
        saveBtn.addEventListener('click', () => {
            displayName.textContent = nameInput.value || '未设置姓名';
            displayBio.textContent = bioInput.value || '未设置个人简介';
        });

        // 头像上传与预览
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    avatarImg.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
